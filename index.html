<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WordFlow Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="words.js"></script>
    <style>
        body { background: #030508; color: white; font-family: sans-serif; }
        .flip-card { perspective: 1000px; cursor: pointer; }
        .flip-card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .face { backface-visibility: hidden; position: absolute; inset: 0; }
        .back { transform: rotateY(180deg); }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

    <div class="w-80 h-80 flip-card" onclick="flip()">
        <div id="card" class="flip-card-inner w-full h-full relative">
            <div class="face front bg-slate-900 rounded-3xl flex items-center justify-center border border-slate-700">
                <h1 id="word-el" class="text-3xl font-bold">Word</h1>
            </div>
            <div class="face back bg-[#0a1a0f] rounded-3xl flex items-center justify-center border border-[#a3e635]">
                <h1 id="fa-el" class="text-2xl font-bold text-[#a3e635]">معنی</h1>
            </div>
        </div>
    </div>

    <button onclick="next()" class="mt-8 px-10 py-3 bg-[#a3e635] text-black font-black rounded-xl">بعدی</button>

    <script>
        let idx = 0;
        function flip() { document.getElementById('card').classList.toggle('is-flipped'); }
        function next() {
            document.getElementById('card').classList.remove('is-flipped');
            idx = (idx + 1) % wordDatabase.length;
            document.getElementById('word-el').innerText = wordDatabase[idx].word;
            document.getElementById('fa-el').innerText = wordDatabase[idx].fa;
        }
        // لود اولیه
        document.getElementById('word-el').innerText = wordDatabase[0].word;
        document.getElementById('fa-el').innerText = wordDatabase[0].fa;
    </script>
</body>
</html>
